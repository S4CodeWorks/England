<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>England FC - Calendário e Notícias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Inicializar AOS (para animações de rolagem)
            AOS.init();

            const games = [
                { time: "16:00", day: "2024-12-01", opponent: "Team A", championship: "Campeonato 1" },
                { time: "18:00", day: "2024-12-05", opponent: "Team B", championship: "Campeonato 2" },
                { time: "20:00", day: "2024-12-10", opponent: "Team C", championship: "Campeonato 3" }
            ];

            const calendarSection = document.getElementById("calendar");
            const buttonGroup = document.createElement("div");
            buttonGroup.classList.add("button-group");

            ["Data", "Hora", "Adversário", "Campeonato"].forEach(label => {
                const button = document.createElement("button");
                button.textContent = label;
                button.addEventListener("click", () => {
                    renderGames(label.toLowerCase());
                });
                buttonGroup.appendChild(button);
            });

            calendarSection.prepend(buttonGroup);

            const gameInfo = document.createElement("div");
            gameInfo.classList.add("game-info");
            calendarSection.appendChild(gameInfo);

            function renderGames(criteria) {
                let content = "";
                games.forEach(game => {
                    if (criteria === "data") {
                        content += `<p><strong>Data:</strong> ${game.day}</p>`;
                    } else if (criteria === "hora") {
                        content += `<p><strong>Hora:</strong> ${game.time}</p>`;
                    } else if (criteria === "adversário") {
                        content += `<p><strong>Adversário:</strong> ${game.opponent}</p>`;
                    } else if (criteria === "campeonato") {
                        content += `<p><strong>Campeonato:</strong> ${game.championship}</p>`;
                    }
                });
                gameInfo.innerHTML = content;
                gameInfo.classList.add("visible");
            }

            const news = [
                { result: "3x2", goals: ["João (10')", "Carlos (45')", "Pedro (78')"] },
                { result: "1x1", goals: ["Lucas (22')"] },
                { result: "0x0", goals: [] }
            ];

            const newsList = document.getElementById("news-list");

            news.forEach(match => {
                const newsItem = document.createElement("div");
                newsItem.classList.add("news-item");

                const result = document.createElement("h3");
                result.textContent = `Resultado: ${match.result}`;
                newsItem.appendChild(result);

                const goals = document.createElement("p");
                goals.innerHTML = `<strong>Gols:</strong> ${match.goals.length > 0 ? match.goals.join(", ") : "Nenhum gol."}`;
                newsItem.appendChild(goals);

                newsList.appendChild(newsItem);
            });
        });
    </script>
</head>
<body>
    <header>
        <img src="https://i.imgur.com/T2MLN5B.png" alt="Logo England FC">
        <h1>England FC</h1>
    </header>

    <main>
        <section id="calendar" data-aos="fade-up">
            <h2>Calendário de Jogos</h2>
        </section>

        <section id="news" data-aos="fade-up">
            <h2>Notícias do Clube</h2>
            <div id="news-list"></div>
        </section>

        <!-- Seção Redes Sociais -->
        <section id="social-media" data-aos="fade-up">
            <h2>Redes Sociais</h2>
            <div class="social-links">
                <a href="https://www.instagram.com/inglaterra_rvbbl/profilecard/?igsh=MTlhNzRpeG50a2NuZQ==" target="_blank" class="social-icon instagram">Instagram</a>
                <a href="https://www.tiktok.com/@the.haat?_t=8rVOmT73XfD&_r=1" target="_blank" class="social-icon tiktok">TikTok</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 England - Todos os direitos reservados</p>
    </footer>
</body>
</html>
